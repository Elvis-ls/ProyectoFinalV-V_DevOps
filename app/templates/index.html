<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - DevOps + V&V</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-check2-square me-2"></i>Task Manager</span>
            <span class="badge bg-info text-dark">Ambiente: DevOps Lab</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Formulario de Nueva Tarea -->
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Nueva Tarea</h5>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('add_task') }}" method="POST">
                            <div class="mb-3">
                                <label for="title" class="form-label">Título</label>
                                <input type="text" class="form-control" id="title" name="title" required placeholder="¿Qué hay que hacer?">
                            </div>
                            <button type="submit" class="btn btn-success w-100">Agregar Tarea</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Lista de Tareas -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Mis Tareas</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Tarea</th>
                                        <th>Estado</th>
                                        <th class="text-end">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for task in tasks %}
                                    <tr>
                                        <td class="align-middle">{{ task.title }}</td>
                                        <td class="align-middle">
                                            <form action="{{ url_for('update_task', id=task.id) }}" method="POST" class="d-inline">
                                                <select name="status" onchange="this.form.submit()" class="form-select form-select-sm d-inline-block w-auto">
                                                    <option value="pendiente" {% if task.status == 'pendiente' %}selected{% endif %}>Pendiente</option>
                                                    <option value="en progreso" {% if task.status == 'en progreso' %}selected{% endif %}>En Progreso</option>
                                                    <option value="completado" {% if task.status == 'completado' %}selected{% endif %}>Completado</option>
                                                </select>
                                            </form>
                                        </td>
                                        <td class="text-end align-middle">
                                            <a href="{{ url_for('delete_task', id=task.id) }}" class="btn btn-outline-danger btn-sm">
                                                <i class="bi bi-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    {% else %}
                                    <tr>
                                        <td colspan="3" class="text-center py-4 text-muted">No hay tareas registradas.</td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-3 text-center text-muted border-top">
        <p>&copy; 2026 Proyecto Integrador Final - DevOps + V&V</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
